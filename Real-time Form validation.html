<html>
    <head>
        <style>
            body{
                font-family: 'Courier New', Courier, monospace;
                text-emphasis: center;
                margin: 0;
                padding: 0;
            }

            .box{
                width: 420px;
                margin: auto;
                border: 2px solid;
                padding: 18px;
            }

            .row{
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                margin: 10px 0;
            }
            
            label{
                width: 90px;
                text-align: right;
                font-size: 18px;
            }
            input{
                height: 24px;
                padding: 4px;
                border: 1px solid black;
            }
            #email,  #password{
                width: 170px;
            }
            #age{
                width: 55px;
            }
            button{
                margin-top: 10px;
                padding: 4px 14px;
                cursor: pointer;
            }
            #message{
                margin-top: 20px;
                font-size: 22px;
                font-weight: 500;
            }
        </style>
    </head>
    <body>
        <div clas="box">
            <form id="loginForm">
                <div class="row">
                    <label>Email : </label>
                    <input type="email" id="email" placeholder="abc@gmail.com">
                </div>

                <div class="row">
                    <label>Pasword </label>
                    <input type="password" id="password" placeholder=".............">
                </div>

                <div class="row">
                    <label>Age : </label>
                    <input type="number" id="age">
                </div>

                <button type="submit">Submit</button>
            </form>
        </div>

        <p id="message"></p>

                e.preventDefault();
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                const age = document.getElementById("age").value;
                const message = document.getElementById("message").value;
            }
        </script>
    </body>
</html>
