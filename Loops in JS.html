<html>
    <head>
        <body>
            <p id="demo"></p>
            <script>
              var Fruits = ["Apple", "Banana", "Kiwi", "Watermelon", "Mango", "Grapes", "pineapple"];

              var text="";
              var i;

              for(i=0; i<Fruits.length; i++){
                text = text + Fruits[i]+"<br>";
              }

              document.getElementById("demo").innerHTML = text;
            </script>
        </body>
    </head>
</html>
