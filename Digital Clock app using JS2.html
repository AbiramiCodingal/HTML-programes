<html>
    <head>
        <title>Digital Clock </title>
    </head>
    <body>
        <h1>Digital Clock</h1>
        <div id="result"></div>
        <script>
            function showtime(){
                var date =  new Date()
                var h = date.getHours()
                var m = date.getMinutes()
                var s = date.getSeconds()
                var session = "AM"
                if (h == 0){
                    h =12
                }
                if (h > 12 ){
                    h = h - 12
                    session =  "PM"
                }
                h = (h < 10)? "0" + h : h
                m = (h < 10)? "0" + m : m
                s = (h < 10)? "0" + s : s
                document.getElementById("result").innerHTML= h + ":" + m + ":" + s + session
                setTimeout(showtime,1000)
            }
            showtime()
            
        </script>
    </body>
</html>
