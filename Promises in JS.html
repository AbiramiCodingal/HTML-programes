<html>
    <body>
        <div id="demo"></div>
        <script>
            function myDisplay(some) {
                document.getElementById("demo").innerHTML = "the result is "+ some;
            }
            function sum (a,b){
                var sum = a+ b
                myDisplay(sum);
            }
            let myPromise = new Promise(function(myResolve, myReject) {
                let x = 0

                if (x==0) {
                    myResolve ("OK");
                } else {
                    myReject ("Error");
                }
            });

            myPromise.then(
                function(value) { sum(5,5); },
                function(error) { sum(error); }
            );
        </script>
    </body>
</html>
