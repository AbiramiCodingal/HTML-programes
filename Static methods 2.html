        <script>
            class student{
                constructor(name){
                    this.studentName = name;
                }
                static Hello(){
                    return "hello";
                }
                static welcome(x){

                }
                hi(){

                }

            let ob = new student("Shifa");

            document.write("<br>"+student.welcome(ob))
        </script>
