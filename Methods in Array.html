<html>
    <body>
        <p id="join"></p>
        <p id="FristPop"></p>
        <p id="FinalStack"></p>
        <script>
            var Fruits = ["Apple", "Dragon Fruit", "Kiwi", "Pineapple", "Watermelon", "Mango", "Banana"]

            document.getElementById("join").innerHTML = Fruits.join("*");
            document.getElementById("FristPop").innerHTML = Fruits.pop("");
            document.getElementById("FinalStack").innerHTML = Fruits;
        </script>
    </body>
</html>
