<html>
    <head>
        <title>Arrow function in JS</title>

    </head>
    <style>
        body{
            background-color: aquamarine;
            font-size: 24;
            color: black;
            text-align: center;
        }
        h1::before{
            content: "💖"
        }
        h1::after{
            content: "💖"
        }
    </style>
    <body>
        <h1>Arrow function in JS</h1>
        <div id="result"></div>
        <script>
            const add = (a,b,c) =>  a+b+c
            document.getElementById("result").innerHTML = "The addition of 20 , 30 , 40 , is " + add(20, 30, 40)
        </script>
    </body>
</html>
