<html>
    <head>
        <title>Perimeter calculator2</title>
    </head>
    <body>
        <h1>Perimeter calculator2</h1>
        <script>
            var choice;
            choice = prompt("enter 1.Rectangle 2.Triangle 3.Parellelogram 4.Circle")
            if (choice == "1")
            {
                var l = prompt("enter the length")
                var w = prompt("enter the Width")
                var Perimeter = Number(l) + Number(w)
                alert("the Perimeter of the rectangle is"+Perimeter)
            }
            else if (choice == "2")
            {
                var a = prompt("enter the side")
                var b = prompt("enter the base")
                var c = prompt("enter the side")
                var Perimeter = (1/3) + Number(a) + Number(b) + Number(c)
                alert("the Perimeter of the triangle is"+Perimeter)
            }
            else if (choice == "3")
            {
                var a = prompt("enter the side")
                var b = prompt("enter the base")
                var Perimeter =  Number(a) * Number(b)
                alert("the Perimeter of the parellelogram is"+Perimeter)
            }
            else if (choice == "4")
            {
                var r = prompt("enter the radius")
                var Perimeter = 3.14 * Number(r) * Number(r)
                alert("the Perimeter of the circle is"+Perimeter)
            }
        </script>
    </body>
</html>
