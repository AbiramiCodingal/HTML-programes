<html>
    <head>
        <title>stop watch</title>
    </head>
    <body>
        <h1>Stop watch</h1>
        <div>
            <h1>Stopwatch</h1>
            <p><span id="seconds">00</span>:<span id="milliseconds">00</span></p>
            </div>
            <button id="button_start">Start</button>
            <button id="button_stop">Stop</button>
            <button id="button_reset">Reset</button>
            <script>
                window.onload = function()
                {
                var sec = 0
                var milliseconds = 0
                var appendseconds  = document.getElementById("seconds")
                var appendmilliseconds  = document.getElementById("milliseconds")
                var button_start  = document.getElementById("button_start")
                var button_stop  = document.getElementById("button_stop")
                var button_reset  = document.getElementById("button_reset")
                var interval
                button_start.onclick = function(){
                    clearInterval(interval)
                    interval = setInterval(starttimer,10)
                }
                button_stop.onclick = function(){
                    clearInterval(interval)
                }
                button_reset.onclick = function(){
                    clearInterval(interval)
                    milliseconds = 0
                    sec = 0
                    appendmilliseconds.innerHTML= "00"
                    appendseconds.innerHTML= "00"
                }
                function starttimer(){
                    milliseconds++
                    if (milliseconds <9){
                        appendmilliseconds.innerHTML = "0"+milliseconds
                    }
                    if (milliseconds >9){
                        appendmilliseconds.innerHTML = milliseconds
                    }
                    if (milliseconds >99){
                        sec++
                        appendseconds.innerHTML = "0"+sec
                        milliseconds= 0
                        appendmilliseconds.innerHTML = "0"+milliseconds
                    }
                    if (sec > 9){
                        appendseconds.innerHTML = sec
                    }
                }
                }
            </script>
    </body>
</html>
