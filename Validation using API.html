<html>
    <head>
        <title>Validation using API</title>
    </head>
    <body>
        <input id = "numid" type = number min = 20 max = 60 required>
        <br>
        <button type="button" onclick="validation();">submit</button>
        <div id="result"></div>
        <script>
            function validation(){
            var inpobj = document.getElementById("numid")
            if (!inpobj.checkValidity()){
                document.getElementById("result").innerHTML = inpobj.validationMessage
            }
            else{
                document.getElementById("result").innerHTML = "input is Ok"
            }
            }
        </script>
    </body>
</html>
