<html>
    <body>
        <p id="demo"></p>
        <script>
            function findMax(){
                var i;
                var max =0;
                for(i=0; i<arguments.length; i++){
                    if(arguments[i]> max){
                        max=arguments[i];
                    }
                }
                return max;
            }

            document.getElementById("demo").innerHTML = findMax(10,4,2,50,3);
        </script>
    </body>
</html>
